<html>
<head>
    <meta charset="UTF-8">
    <title>Meu Pet Virtual</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
</head>

<body class="min-h-screen flex flex-col items-center"
      style="background-image: url('bg.png'); background-size: cover;">

    <!-- TOGGLE -->
    <div style="position: fixed; top: 20px; right: 20px;">
        ☀️
        <input type="checkbox" id="day-night-toggle" />
        🌙
    </div>

    <!-- AVATAR + NOME -->
    <div class="w-full flex items-center p-4 gap-4">
        <div class="avatar">
            <div class="w-16 rounded-full ring">
                <img src="b_c.png" />
            </div>
        </div>

        <input 
            type="text" 
            placeholder="Nome da conta..." 
        />
    </div>

    <!-- PET -->
    <img id="mainImage" src="b_n.png" class="w-full max-w-md" />

    <!-- BOTÕES -->
    <div class="flex gap-4 mt-6">
        <button onclick="alimentar()">🍪 Comer</button>
        <button onclick="matar()">💀 Matar</button>
        <button onclick="brincar()">🎮 Brincar</button>
        <button onclick="reviver()">✨ Reviver</button>
        <button onclick="alegre()"> 😄 alegre</button>
         <button onclick="puto()"> 😡 puto</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
