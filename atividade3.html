<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="description" content="Curiosidades e fatos históricos da Ciência da Computação">
<meta name="author" content="Portal Computação">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquivo Confuso da Computação</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* CORPO */

body{
background:#f4f6f8;
color:#333;
line-height:1.6;
}

/* CONTAINER */

#pagina{
width:90%;
max-width:1200px;
margin:auto;
}

/* HEADER */

header{
background:#1e293b;
color:white;
padding:30px;
text-align:center;
}

header h1{
margin-bottom:10px;
}

/* MENU */

nav{
background:#0f172a;
}

nav ul{
display:flex;
flex-wrap:wrap;
justify-content:center;
list-style:none;
}

nav li{
margin:5px;
}

nav a{
display:block;
padding:12px 18px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
background:#2563eb;
border-radius:5px;
}

/* SEÇÕES */

section{
background:white;
margin:30px 0;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

section h2{
margin-bottom:15px;
color:#1e293b;
}

/* ARTIGOS */

article{
margin-bottom:20px;
padding-bottom:15px;
border-bottom:1px solid #eee;
}

article h3{
color:#2563eb;
margin-bottom:5px;
}

/* ASIDE */

aside{
background:#e0f2fe;
padding:15px;
border-left:5px solid #0284c7;
margin-top:15px;
}

/* DETALHES */

details{
margin-top:10px;
}

summary{
cursor:pointer;
font-weight:bold;
}

/* CITAÇÕES */

blockquote{
margin-top:10px;
padding:10px 15px;
background:#f1f5f9;
border-left:4px solid #2563eb;
font-style:italic;
}

/* CÓDIGOS */

code{
background:#e5e7eb;
padding:3px 6px;
border-radius:4px;
}

pre{
background:#111827;
color:#10b981;
padding:15px;
border-radius:6px;
overflow-x:auto;
}

/* TABELAS */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th{
background:#2563eb;
color:white;
padding:10px;
}

table td{
padding:10px;
border:1px solid #ddd;
}

table tr:nth-child(even){
background:#f8fafc;
}

/* FORMULÁRIOS */

fieldset{
border:2px solid #ddd;
padding:20px;
border-radius:8px;
}

legend{
padding:5px 10px;
font-weight:bold;
}

label{
display:block;
margin-top:10px;
margin-bottom:5px;
}

input, textarea, select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
min-height:100px;
}

input[type="submit"]{
margin-top:15px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

input[type="submit"]:hover{
background:#1d4ed8;
}

/* RODAPÉ */

footer{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

footer address{
margin-top:5px;
font-style:normal;
opacity:0.8;
}

/* RESPONSIVO */

@media (max-width:768px){

nav ul{
flex-direction:column;
align-items:center;
}

section{
padding:15px;
}

}

</style>
</head>
<body>

<!-- SEU HTML CONTINUA AQUI NORMALMENTE -->

</body>
</html>
